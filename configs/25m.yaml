# ~29M params. GPU sanity-scale preset: fast full runs to validate data + training.
model:
  vocab_size: 16384
  d_model: 512
  n_layers: 6
  n_heads: 8
  ffn_hidden: 1536
  max_seq_len: 1024
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  dropout: 0.0
  tie_embeddings: true
train:
  batch_size: 32
  grad_accum: 1
  max_steps: 600          # ~23 epochs of the ~840k-token seed corpus; raise with corpus growth
  lr: 8.0e-4
  min_lr: 8.0e-5
  warmup_steps: 60
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 50
  eval_batches: 20
  sample_interval: 200
  checkpoint_interval: 200
  dtype: bfloat16
  compile: true
  seed: 1337
  data_dir: data/tokens
  out_dir: checkpoints/25m
