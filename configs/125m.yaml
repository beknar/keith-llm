# ~126M params. Primary production preset for the TTRPG domain corpus.
model:
  vocab_size: 16384
  d_model: 768
  n_layers: 12
  n_heads: 12
  ffn_hidden: 3072
  max_seq_len: 2048
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  dropout: 0.0
  tie_embeddings: true
train:
  batch_size: 16
  grad_accum: 4
  max_steps: 5000
  lr: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 500
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 250
  eval_batches: 50
  sample_interval: 500
  checkpoint_interval: 500
  dtype: bfloat16
  compile: true
  seed: 1337
  data_dir: data/tokens
  out_dir: checkpoints/125m
