# Data source manifest.
#
# Each entry maps a glob (relative to the repo root) onto ingestion metadata:
#   system:      one of keith_llm.constants.SYSTEMS (dnd5e, savage_worlds, d6,
#                generic, homebrew, plus the per-system split tokens)
#   doc_type:    adventure | rules | bestiary | setting
#   license:     SPDX-ish identifier (CC-BY-4.0, OGL-1.0a, proprietary, ...)
#   publishable: true only for openly licensed content; the publishable subset
#                is what a publicly released dataset/model may be trained on.
#
# data/seed/ holds downloaded open content (scripts/fetch_seed_data.sh).
# data/raw/ holds user-owned material and is never committed or published.

sources:
  - glob: data/seed/srd_5.1/**/*
    system: dnd5e
    doc_type: rules
    license: CC-BY-4.0
    publishable: true

  - glob: data/seed/opend6/rules/**/*
    system: d6
    doc_type: rules
    license: OGL-1.0a
    publishable: true

  - glob: data/seed/opend6/bestiary/**/*
    system: d6
    doc_type: bestiary
    license: OGL-1.0a
    publishable: true

  - glob: data/seed/opend6/setting/**/*
    system: d6
    doc_type: setting
    license: OGL-1.0a
    publishable: true

  # User-owned corpus: drop files under data/raw/<system>/<doc_type>/ and add
  # entries like the ones below.
  - glob: data/raw/savage_worlds/rules/**/*
    system: savage_worlds
    doc_type: rules
    license: proprietary
    publishable: false

  - glob: data/raw/savage_worlds/adventure/**/*
    system: savage_worlds
    doc_type: adventure
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/adventure/**/*
    system: dnd5e
    doc_type: adventure
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/rules/**/*
    system: dnd5e
    doc_type: rules
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/bestiary/**/*
    system: dnd5e
    doc_type: bestiary
    license: proprietary
    publishable: false

  # --- Per-system split -------------------------------------------------------
  # Converted corpus folders above ~7M tokens, moved out of data/raw/other/ into
  # data/raw/<system>/ and given their own <|system:...|> token. doc_type:
  # setting is a placeholder (these folders mix rules/adventures); refine later
  # with `keith-llm classify` if per-doc-type steering is wanted.
  # Existing tokens (savage_worlds, d6) reuse converted/ subdirs.
  - glob: data/raw/savage_worlds/converted/**/*
    system: savage_worlds
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/d6/converted/**/*
    system: d6
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/call_of_cthulhu/**/*
    system: call_of_cthulhu
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_magazines/**/*
    system: dnd_magazines
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_2e/**/*
    system: dnd_2e
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_3e/**/*
    system: dnd_3e
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_35/**/*
    system: dnd_35
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/fate/**/*
    system: fate
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_becmi/**/*
    system: dnd_becmi
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/d20_modern/**/*
    system: d20_modern
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/shadowrun/**/*
    system: shadowrun
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dnd_4e/**/*
    system: dnd_4e
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/d20_variants/**/*
    system: d20_variants
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/add_1e/**/*
    system: add_1e
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/cypher/**/*
    system: cypher
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/l5r/**/*
    system: l5r
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/warhammer_40k/**/*
    system: warhammer_40k
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/gurps/**/*
    system: gurps
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/starfire/**/*
    system: starfire
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/battletech/**/*
    system: battletech
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/deadlands/**/*
    system: deadlands
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/exalted/**/*
    system: exalted
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/iron_kingdoms/**/*
    system: iron_kingdoms
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/cyberpunk/**/*
    system: cyberpunk
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/dcc/**/*
    system: dcc
    doc_type: setting
    license: proprietary
    publishable: false

  - glob: data/raw/world_of_darkness/**/*
    system: world_of_darkness
    doc_type: setting
    license: proprietary
    publishable: false

  # Catch-all: everything still under data/raw/other/ (systems below the ~7M
  # split threshold) trains as generic. The tokened folders above were moved
  # out, so this no longer double-matches them.
  - glob: data/raw/other/**/*
    system: generic
    doc_type: setting
    license: proprietary
    publishable: false

  # Generic non-domain prose (openly licensed) fetched by
  # `keith-llm fetch-generic` into data/seed/generic/<name>/. Tagged
  # system: generic; doc_type: setting is a placeholder (DOC_TYPES is frozen) —
  # the meaningful conditioning signal is the <|system:generic|> token.
  - glob: data/seed/generic/wikitext/**/*
    system: generic
    doc_type: setting
    license: CC-BY-SA-4.0
    publishable: true

  - glob: data/seed/generic/wikipedia/**/*
    system: generic
    doc_type: setting
    license: CC-BY-SA-4.0
    publishable: true

  - glob: data/seed/generic/gutenberg/**/*
    system: generic
    doc_type: setting
    license: public-domain
    publishable: true
