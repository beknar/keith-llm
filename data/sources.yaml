# Data source manifest.
#
# Each entry maps a glob (relative to the repo root) onto ingestion metadata:
#   system:      dnd5e | savage_worlds | d6 | generic | homebrew
#   doc_type:    adventure | rules | bestiary | setting
#   license:     SPDX-ish identifier (CC-BY-4.0, OGL-1.0a, proprietary, ...)
#   publishable: true only for openly licensed content; the publishable subset
#                is what a publicly released dataset/model may be trained on.
#
# data/seed/ holds downloaded open content (scripts/fetch_seed_data.sh).
# data/raw/ holds user-owned material and is never committed or published.

sources:
  - glob: data/seed/srd_5.1/**/*
    system: dnd5e
    doc_type: rules
    license: CC-BY-4.0
    publishable: true

  - glob: data/seed/opend6/rules/**/*
    system: d6
    doc_type: rules
    license: OGL-1.0a
    publishable: true

  - glob: data/seed/opend6/bestiary/**/*
    system: d6
    doc_type: bestiary
    license: OGL-1.0a
    publishable: true

  - glob: data/seed/opend6/setting/**/*
    system: d6
    doc_type: setting
    license: OGL-1.0a
    publishable: true

  # User-owned corpus: drop files under data/raw/<system>/<doc_type>/ and add
  # entries like the ones below.
  - glob: data/raw/savage_worlds/rules/**/*
    system: savage_worlds
    doc_type: rules
    license: proprietary
    publishable: false

  - glob: data/raw/savage_worlds/adventure/**/*
    system: savage_worlds
    doc_type: adventure
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/adventure/**/*
    system: dnd5e
    doc_type: adventure
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/rules/**/*
    system: dnd5e
    doc_type: rules
    license: proprietary
    publishable: false

  - glob: data/raw/dnd5e/bestiary/**/*
    system: dnd5e
    doc_type: bestiary
    license: proprietary
    publishable: false

  # Catch-all for user-owned material tagged generic: converted text from
  # systems without their own <|system:...|> token (Pathfinder, GURPS, ...) or
  # miscellaneous in-domain prose. doc_type: setting is a placeholder.
  - glob: data/raw/other/**/*
    system: generic
    doc_type: setting
    license: proprietary
    publishable: false

  # Generic non-domain prose (openly licensed) fetched by
  # `keith-llm fetch-generic` into data/seed/generic/<name>/. Tagged
  # system: generic; doc_type: setting is a placeholder (DOC_TYPES is frozen) —
  # the meaningful conditioning signal is the <|system:generic|> token.
  - glob: data/seed/generic/wikitext/**/*
    system: generic
    doc_type: setting
    license: CC-BY-SA-4.0
    publishable: true

  - glob: data/seed/generic/wikipedia/**/*
    system: generic
    doc_type: setting
    license: CC-BY-SA-4.0
    publishable: true

  - glob: data/seed/generic/gutenberg/**/*
    system: generic
    doc_type: setting
    license: public-domain
    publishable: true
