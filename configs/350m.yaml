# ~352M params. Stretch preset — only worthwhile once the corpus grows well
# past ~100M tokens; watch train/val divergence closely.
model:
  vocab_size: 16384
  d_model: 1024
  n_layers: 20
  n_heads: 16
  ffn_hidden: 4096
  max_seq_len: 2048
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  dropout: 0.0
  tie_embeddings: true
train:
  batch_size: 8
  grad_accum: 8
  max_steps: 5000
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 500
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 250
  eval_batches: 50
  sample_interval: 500
  checkpoint_interval: 500
  dtype: bfloat16
  compile: true
  seed: 1337
  data_dir: data/tokens
  out_dir: checkpoints/350m
